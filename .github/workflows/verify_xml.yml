name: Verify XML

concurrency:
  group: verify-xml-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  verify:
    name: Verify XML
    uses: Ahli/verify-xml-action@v2
    with:
      path: "./"
      file-endings: ".xml"
